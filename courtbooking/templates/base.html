{% extends "base.html" %}
{% block content %}

<div class="p-4">
    <h1 class="text-2xl font-bold mb-1">Available Courts</h1>
    <p class="text-gray-500 mb-4">Pick a court to book your session</p>

    <div class="space-y-3">
    {% for court in courts %}
        <div class="bg-gray-100 rounded-lg p-4 flex justify-between items-center">
            <div>
                <p class="font-semibold">{{ court.name }}</p>
                <p class="text-sm text-gray-500">{{ court.sport.name }} — {{ court.hourly_rate }} THB/hr</p>
            </div>
            <a href="{% url 'courts:book-court' court.id %}" class="bg-green-600 text-white text-sm px-4 py-2 rounded">Book</a>
        </div>
    {% endfor %}
    </div>
</div>

{% endblock %}
