{% extends "base.html" %}
{% block content %}

<div class="p-4">
    <h1 class="text-2xl font-bold mb-2">{{ activity.name }}</h1>
    <p class="text-gray-500 mb-1">{{ activity.sport.name }} — {{ activity.date }}</p>
    <p class="text-gray-500 mb-4">{{ activity.price }} THB — {{ spots_left }} spots left</p>

    {% if error %}
        <p class="text-red-600 mb-4">{{ error }}</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <label class="block mb-4">
            Number of participants
            <input type="number" name="participant_count" value="1" min="1" class="border rounded p-2 w-full">
        </label>
        <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded">Register</button>
    </form>
</div>

{% endblock %}
