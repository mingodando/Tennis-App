{% extends "base.html" %}
{% block content %}

<div class="p-4">
    <h1 class="text-2xl font-bold mb-4">Activities</h1>
    <ul class="space-y-3">
    {% for activity in activities %}
        <li class="bg-gray-100 rounded-lg p-4">
            <p class="font-semibold">{{ activity.name }}</p>
            <p class="text-sm text-gray-500">{{ activity.sport.name }} — {{ activity.date }}</p>
            <p class="text-sm text-gray-500">{{ activity.price }} THB</p>
        </li>
    {% empty %}
        <p class="text-gray-500">No activities available right now.</p>
    {% endfor %}
    </ul>
</div>

{% endblock %}
