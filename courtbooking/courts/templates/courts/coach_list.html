{% extends "base.html" %}
{% block content %}

<div class="p-4">
    <h1 class="text-2xl font-bold mb-1">Coaches</h1>
    <p class="text-gray-500 mb-4">Pick a coach to book your session</p>

    <div class="space-y-3">
    {% for coach in coaches %}
        <div class="bg-gray-100 rounded-lg p-4 flex justify-between items-center">
            <div>
                <p class="font-semibold">{{ coach.name }}</p>
                <p class="text-sm text-gray-500">{{ coach.sport.name }} — {{ coach.hourly_rate }} THB/hr</p>
            </div>
            <a href="{% url 'courts:book-coach' coach.id %}" class="bg-yellow-600 text-white text-sm px-4 py-2 rounded">Book</a>
        </div>
    {% empty %}
        <p class="text-gray-500">No coaches available right now.</p>
    {% endfor %}
    </div>
</div>

{% endblock %}
