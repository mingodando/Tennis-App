{% extends "base.html" %}
{% block content %}

<div class="p-4">
    <h1 class="text-2xl font-bold mb-4">Coaches</h1>
    <ul class="space-y-3">
    {% for coach in coaches %}
        <li class="bg-gray-100 rounded-lg p-4">
            <p class="font-semibold">{{ coach.name }}</p>
            <p class="text-sm text-gray-500">{{ coach.sport.name }}</p>
            <p class="text-sm text-gray-500">{{ coach.hourly_rate }} THB/hr</p>
        </li>
    {% empty %}
        <p class="text-gray-500">No coaches available right now.</p>
    {% endfor %}
    </ul>
</div>

{% endblock %}
