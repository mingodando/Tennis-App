{% extends "base.html" %}
{% block content %}

<div class="p-4">
    <h1 class="text-2xl font-bold mb-2">Book {{ court.name }}</h1>
    <p class="text-gray-500 mb-4">{{ court.hourly_rate }} THB/hr</p>

    {% if error %}
        <p class="text-red-600 mb-4">{{ error }}</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <label class="block mb-2">
            Date
            <input type="date" name="date" required class="border rounded p-2 w-full">
        </label>

        <label class="block mb-2">
            Start Time
            <input type="time" name="start_time" required class="border rounded p-2 w-full">
        </label>

        <label class="block mb-4">
            Duration
            <select name="duration" class="border rounded p-2 w-full">
                <option value="60">1 hour</option>
                <option value="90">1.5 hours</option>
                <option value="120">2 hours</option>
            </select>
        </label>

        <button type="submit" class="bg-green-600 text-white px-4 py-2 rounded">Confirm Booking</button>
    </form>
</div>

{% endblock %}
