{% extends "base.html" %}
{% block content %}

<div class="p-4">
    <h1 class="text-2xl font-bold">Hello, {{ user.username }}</h1>
    <p class="text-gray-500">Welcome back to The Verve</p>

    <div class="mt-6 bg-gray-100 rounded-lg p-4">
        <h2 class="font-semibold mb-2">Upcoming Bookings</h2>
        <p class="text-gray-500 text-sm">No upcoming bookings yet.</p>
    </div>

    <div class="mt-6">
        <h2 class="font-semibold mb-2">Play</h2>
        <div class="grid grid-cols-3 gap-3">
            <a href="{% url 'courts:court-list' %}" class="bg-green-100 rounded-lg p-4 text-center">
                <p class="text-sm font-medium">Book a Court</p>
            </a>
            <a href="{% url 'courts:activity-list' %}" class="bg-blue-100 rounded-lg p-4 text-center">
                <p class="text-sm font-medium">Book Activity</p>
            </a>
            <a href="#" class="bg-yellow-100 rounded-lg p-4 text-center">
                <p class="text-sm font-medium">Book Coach</p>
            </a>
        </div>
    </div>
</div>

{% endblock %}
